name: "CI/CD Pipeline - FinTech Nova"

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-security:
    name: "Seguridad, Pruebas y Build"
    runs-on: ubuntu-latest

    steps:
      - name: "📥 Descargar código del repositorio"
        uses: actions/checkout@v4

      - name: "🐍 Configurar Python 3.11"
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: "📦 Instalar dependencias"
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: "🔒 Auditoría de Seguridad con pip-audit"
        run: |
          pip install pip-audit
          pip-audit --requirement requirements.txt --format=columns

      - name: "🧪 Ejecutar pruebas automáticas"
        run: |
          pytest app/test_main.py -v --tb=short

      - name: "🐳 Construir imagen Docker"
        run: |
          docker build -t fintech-nova:${{ github.sha }} .
          docker build -t fintech-nova:latest .

      - name: "✅ Verificar imagen Docker (Smoke Test)"
        run: |
          docker run -d --name fintech-test -p 8000:8000 fintech-nova:latest
          sleep 3
          curl --fail http://localhost:8000/health || (docker logs fintech-test && exit 1)
          docker stop fintech-test && docker rm fintech-test

      - name: "📊 Resumen del Pipeline"
        run: |
          echo "Pipeline completado: fintech-nova:${{ github.sha }}"
